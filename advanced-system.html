<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初级会计备考 - 进阶版自测系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #667eea; --success: #4CAF50; --warning: #ff9800; --danger: #f44336; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; color: white; margin-bottom: 20px; }
        .header-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .stat-number { font-size: 24px; font-weight: bold; color: var(--primary); }
        .stat-label { color: #666; margin-top: 5px; font-size: 13px; }
        .main-nav { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        .nav-btn { padding: 12px 30px; background: white; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; transition: all 0.3s; }
        .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .nav-btn.active { background: var(--primary); color: white; }
        .content-area { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .filter-bar select, .filter-bar input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .question-card { background: #f9f9f9; padding: 25px; margin-bottom: 20px; border-radius: 12px; border-left: 5px solid var(--primary); position: relative; }
        .question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .type-tag { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .type-tag.single { background: #bbdefb; color: #1976d2; }
        .type-tag.multi { background: #c8e6c9; color: #388e3c; }
        .type-tag.true_false { background: #fff3e0; color: #f57c00; }
        .type-tag.calculation { background: #f3e5f5; color: #7b1fa2; }
        .question-actions { display: flex; gap: 5px; }
        .action-btn { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .action-btn.favorite { background: #fff3e0; color: #ff9800; }
        .action-btn.favorite.active { background: #ff9800; color: white; }
        .action-btn.bookmark { background: #e3f2fd; color: #2196f3; }
        .question-text { font-size: 17px; margin-bottom: 20px; line-height: 1.6; }
        .options { list-style: none; }
        .options li { padding: 12px 16px; margin: 8px 0; background: white; border-radius: 8px; cursor: pointer; transition: all 0.3s; border: 2px solid #e0e0e0; }
        .options li:hover { background: #f0f7ff; border-color: var(--primary); }
        .options li.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .options li.correct { background: var(--success); color: white; border-color: var(--success); }
        .options li.incorrect { background: var(--danger); color: white; border-color: var(--danger); }
        .answer-section { margin-top: 20px; padding: 20px; background: #e8f5e9; border-radius: 8px; display: none; }
        .answer-section.show { display: block; }
        .progress-bar { height: 12px; background: #e0e0e0; border-radius: 6px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #764ba2); transition: width 0.5s; }
        .score-display { font-size: 26px; font-weight: bold; text-align: center; margin: 20px 0; padding: 20px; background: linear-gradient(135deg, var(--primary), #764ba2); color: white; border-radius: 10px; }
        .action-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .btn { padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; color: white; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-secondary { background: #9e9e9e; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px; }
        .tab { padding: 10px 20px; background: #f5f5f5; border-radius: 8px 8px 0 0; cursor: pointer; }
        .tab.active { background: var(--primary); color: white; }
        .empty-state { text-align: center; padding: 50px; color: #999; }
        .analysis-chart { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 20px 0; }
        .chart-item { background: #f5f5f5; padding: 20px; border-radius: 8px; text-align: center; }
        .chart-bar { height: 20px; background: #e0e0e0; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .chart-fill { height: 100%; background: var(--primary); border-radius: 10px; transition: width 1s; }
        @media (max-width: 768px) { .content-area { padding: 15px; } .question-card { padding: 15px; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 初级会计备考 - 进阶版自测系统</h1>
        
        <div class="header-stats">
            <div class="stat-card"><div class="stat-number" id="stat-total">125</div><div class="stat-label">总题数</div></div>
            <div class="stat-card"><div class="stat-number" id="stat-answered">0</div><div class="stat-label">已答题</div></div>
            <div class="stat-card"><div class="stat-number" id="stat-correct">0</div><div class="stat-label">正确数</div></div>
            <div class="stat-card"><div class="stat-number" id="stat-wrong">0</div><div class="stat-label">错题数</div></div>
            <div class="stat-card"><div class="stat-number" id="stat-favorite">0</div><div class="stat-label">收藏数</div></div>
            <div class="stat-card"><div class="stat-number" id="stat-accuracy">0%</div><div class="stat-label">正确率</div></div>
        </div>
        
        <div class="main-nav">
            <button class="nav-btn active" onclick="switchMode('practice')">📖 练习模式</button>
            <button class="nav-btn" onclick="switchMode('wrong')">❌ 错题本</button>
            <button class="nav-btn" onclick="switchMode('favorite')">⭐ 收藏夹</button>
            <button class="nav-btn" onclick="switchMode('analysis')">📊 学习分析</button>
        </div>
        
        <div class="content-area">
            <div id="practice-view">
                <div class="tabs">
                    <div class="tab active" onclick="filterSubject('all')">全部科目</div>
                    <div class="tab" onclick="filterSubject('初级会计实务')">💼 会计实务</div>
                    <div class="tab" onclick="filterSubject('经济法基础')">⚖️ 经济法</div>
                </div>
                
                <div class="filter-bar">
                    <select id="filter-type" onchange="renderQuestions()">
                        <option value="all">全部题型</option>
                        <option value="single">单选题</option>
                        <option value="multi">多选题</option>
                        <option value="true_false">判断题</option>
                        <option value="calculation">计算分析题</option>
                    </select>
                    <input type="text" id="search-keyword" placeholder="搜索题目..." oninput="renderQuestions()">
                    <select id="filter-status" onchange="renderQuestions()">
                        <option value="all">全部状态</option>
                        <option value="answered">已答</option>
                        <option value="unanswered">未答</option>
                        <option value="correct">正确</option>
                        <option value="wrong">错误</option>
                    </select>
                </div>
                
                <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width: 0%"></div></div>
                <div class="score-display">得分：<span id="score-current">0</span> / <span id="score-total">0</span> | 正确率：<span id="accuracy-current">0%</span></div>
                
                <div id="questions-container"></div>
                
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="checkAnswers()">✅ 提交答案</button>
                    <button class="btn btn-secondary" onclick="showAllAnswers()">👁️ 查看答案</button>
                    <button class="btn btn-secondary" onclick="resetPractice()">🔄 重新开始</button>
                    <button class="btn btn-success" onclick="exportReport()">📥 导出报告</button>
                </div>
            </div>
            
            <div id="wrong-view" class="hidden">
                <h2 style="margin-bottom: 20px;">❌ 错题本</h2>
                <div id="wrong-questions"></div>
            </div>
            
            <div id="favorite-view" class="hidden">
                <h2 style="margin-bottom: 20px;">⭐ 收藏夹</h2>
                <div id="favorite-questions"></div>
            </div>
            
            <div id="analysis-view" class="hidden">
                <h2 style="margin-bottom: 20px;">📊 学习分析</h2>
                <div class="analysis-chart">
                    <div class="chart-item">
                        <div style="font-size: 36px; font-weight: bold; color: var(--primary);" id="analysis-total">0</div>
                        <div>总答题数</div>
                    </div>
                    <div class="chart-item">
                        <div style="font-size: 36px; font-weight: bold; color: var(--success);" id="analysis-correct">0</div>
                        <div>正确数</div>
                    </div>
                    <div class="chart-item">
                        <div style="font-size: 36px; font-weight: bold; color: var(--danger);" id="analysis-wrong">0</div>
                        <div>错误数</div>
                    </div>
                    <div class="chart-item">
                        <div style="font-size: 36px; font-weight: bold; color: var(--warning);" id="analysis-accuracy">0%</div>
                        <div>正确率</div>
                    </div>
                </div>
                
                <h3 style="margin: 30px 0 15px;">题型掌握情况</h3>
                <div id="type-analysis"></div>
                
                <h3 style="margin: 30px 0 15px;">科目掌握情况</h3>
                <div id="subject-analysis"></div>
            </div>
        </div>
    </div>
    
    <script>
        // 题库数据
        const questionsData = [{"subject":"初级会计实务","questions":[{"id":1,"type":"single","subject":"初级会计实务","text":"下列各项中，属于企业资产的是（ ）","options":["A. 应付账款","B. 预收账款","C. 应收账款","D. 短期借款"],"answer":"C","explanation":"应收账款属于企业的资产，其他选项均为负债。"},{"id":2,"type":"single","subject":"初级会计实务","text":"企业收到投资者投入的资本，应贷记的会计科目是（ ）","options":["A. 银行存款","B. 实收资本","C. 资本公积","D. 盈余公积"],"answer":"B","explanation":"收到投资者投入资本，应贷记"实收资本"科目。"},{"id":3,"type":"true_false","subject":"初级会计实务","text":"企业的资产总额等于负债总额加上所有者权益总额。（ ）","options":["✓ 正确","✗ 错误"],"answer":"✓ 正确","explanation":"这是会计基本等式：资产 = 负债 + 所有者权益。"},{"id":4,"type":"multi","subject":"初级会计实务","text":"下列各项中，属于流动资产的有（ ）","options":["A. 货币资金","B. 应收账款","C. 存货","D. 固定资产"],"answer":"A、B、C","explanation":"流动资产包括货币资金、应收账款、存货等，固定资产属于非流动资产。"},{"id":5,"type":"calculation","subject":"初级会计实务","text":"某企业 2025 年 12 月 31 日应收账款余额为 100 万元，坏账准备贷方余额为 5 万元。2026 年发生坏账损失 3 万元，收回已核销的坏账 2 万元。2026 年 12 月 31 日应收账款余额为 120 万元，坏账准备应保持的贷方余额为 6 万元。则 2026 年应计提的坏账准备为（ ）万元。","options":["A. 2","B. 3","C. 4","D. 5"],"answer":"A","explanation":"2026 年应计提坏账准备 = 6 - (5 - 3 + 2) = 6 - 4 = 2 万元。"}]},{"subject":"经济法基础","questions":[{"id":1,"type":"single","subject":"经济法基础","text":"下列各项中，属于法律关系主体的是（ ）","options":["A. 自然人","B. 物","C. 行为","D. 智力成果"],"answer":"A","explanation":"法律关系主体包括自然人、法人和其他组织。物、行为、智力成果属于法律关系客体。"},{"id":2,"type":"true_false","subject":"经济法基础","text":"会计档案的保管期限分为永久和定期两类。（ ）","options":["✓ 正确","✗ 错误"],"answer":"✓ 正确","explanation":"会计档案保管期限分为永久和定期两类，定期保管期限一般为 10 年或 30 年。"},{"id":3,"type":"multi","subject":"经济法基础","text":"下列各项中，属于会计职业道德内容的有（ ）","options":["A. 爱岗敬业","B. 诚实守信","C. 廉洁自律","D. 客观公正"],"answer":"A、B、C、D","explanation":"会计职业道德包括爱岗敬业、诚实守信、廉洁自律、客观公正、坚持准则、提高技能、参与管理、强化服务。"},{"id":4,"type":"single","subject":"经济法基础","text":"根据《会计法》规定，我国会计年度自（ ）","options":["A. 公历 1 月 1 日起至 12 月 31 日止","B. 农历 1 月 1 日起至 12 月 31 日止","C. 公历 4 月 1 日起至次年 3 月 31 日止","D. 农历 4 月 1 日起至次年 3 月 31 日止"],"answer":"A","explanation":"我国会计年度自公历 1 月 1 日起至 12 月 31 日止。"},{"id":5,"type":"calculation","subject":"经济法基础","text":"某企业为增值税一般纳税人，2026 年 3 月销售商品取得不含税收入 100 万元，适用增值税税率 13%。当月购进原材料取得增值税专用发票注明税额 8 万元。则该企业 3 月应缴纳的增值税为（ ）万元。","options":["A. 5","B. 8","C. 10","D. 13"],"answer":"A","explanation":"应纳增值税 = 销项税额 - 进项税额 = 100×13% - 8 = 13 - 8 = 5 万元。"}]}];
        
        let currentMode = 'practice';
        let currentSubject = 'all';
        let currentType = 'all';
        let currentStatus = 'all';
        let selectedAnswers = {};
        let wrongQuestions = JSON.parse(localStorage.getItem('wrongQuestions') || '[]');
        let favoriteQuestions = JSON.parse(localStorage.getItem('favoriteQuestions') || '[]');
        let answerHistory = JSON.parse(localStorage.getItem('answerHistory') || '[]');
        
        // 初始化
        document.getElementById('stat-total').textContent = questionsData.flatMap(d => d.questions).length;
        document.getElementById('stat-favorite').textContent = favoriteQuestions.length;
        document.getElementById('stat-wrong').textContent = wrongQuestions.length;
        
        // 切换模式
        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('practice-view').classList.toggle('hidden', mode !== 'practice');
            document.getElementById('wrong-view').classList.toggle('hidden', mode !== 'wrong');
            document.getElementById('favorite-view').classList.toggle('hidden', mode !== 'favorite');
            document.getElementById('analysis-view').classList.toggle('hidden', mode !== 'analysis');
            
            if (mode === 'wrong') renderWrongQuestions();
            if (mode === 'favorite') renderFavoriteQuestions();
            if (mode === 'analysis') renderAnalysis();
            if (mode === 'practice') renderQuestions();
        }
        
        // 筛选题目
        function filterSubject(subject) {
            currentSubject = subject;
            document.querySelectorAll('#practice-view .tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderQuestions();
        }
        
        // 渲染题目
        function renderQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            selectedAnswers = {};
            
            let allQuestions = questionsData.flatMap(d => d.questions);
            
            // 筛选
            if (currentSubject !== 'all') {
                allQuestions = allQuestions.filter(q => q.subject === currentSubject);
            }
            
            const typeFilter = document.getElementById('filter-type').value;
            if (typeFilter !== 'all') {
                allQuestions = allQuestions.filter(q => q.type === typeFilter);
            }
            
            const keyword = document.getElementById('search-keyword').value;
            if (keyword) {
                allQuestions = allQuestions.filter(q => q.text.includes(keyword));
            }
            
            // 限制显示 50 题
            allQuestions = allQuestions.slice(0, 50);
            
            document.getElementById('score-total').textContent = allQuestions.length;
            
            allQuestions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                
                const typeName = {'single':'单选题','multi':'多选题','true_false':'判断题','calculation':'计算分析题'}[q.type];
                const isFavorite = favoriteQuestions.includes(q.id);
                
                card.innerHTML = `
                    <div class="question-header">
                        <span class="type-tag ${q.type}">${typeName}</span>
                        <div class="question-actions">
                            <button class="action-btn favorite ${isFavorite ? 'active' : ''}" onclick="toggleFavorite(${q.id})">⭐ ${isFavorite ? '已收藏' : '收藏'}</button>
                        </div>
                    </div>
                    <div class="question-text">${index + 1}. ${q.text}</div>
                    <ul class="options" data-question="${index}" data-id="${q.id}">
                        ${q.options.map((opt, i) => `<li data-option="${i}">${opt}</li>`).join('')}
                    </ul>
                    <div class="answer-section" id="answer-${index}">
                        <strong>✅ 正确答案：</strong> ${q.answer}<br>
                        ${q.explanation ? `<strong>📝 解析：</strong> ${q.explanation}` : ''}
                    </div>
                `;
                container.appendChild(card);
            });
            
            // 绑定事件
            document.querySelectorAll('.options li').forEach(li => {
                li.addEventListener('click', function() {
                    const qIdx = this.parentElement.dataset.question;
                    const qId = this.parentElement.dataset.id;
                    const oIdx = this.dataset.option;
                    const q = allQuestions[qIdx];
                    
                    if (q.type === 'multi') {
                        this.classList.toggle('selected');
                        const selected = Array.from(this.parentElement.querySelectorAll('li.selected')).map(l => parseInt(l.dataset.option));
                        selectedAnswers[qId] = selected;
                    } else {
                        this.parentElement.querySelectorAll('li').forEach(l => l.classList.remove('selected'));
                        this.classList.add('selected');
                        selectedAnswers[qId] = [parseInt(oIdx)];
                    }
                    
                    updateProgress();
                });
            });
            
            updateProgress();
        }
        
        // 更新进度
        function updateProgress() {
            const answered = Object.keys(selectedAnswers).length;
            const total = document.getElementById('score-total').textContent;
            const percent = total > 0 ? (answered / total) * 100 : 0;
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('stat-answered').textContent = answered;
        }
        
        // 提交答案
        function checkAnswers() {
            document.querySelectorAll('.answer-section').forEach(a => a.classList.add('show'));
            let correct = 0, total = 0;
            
            document.querySelectorAll('.options').forEach(ul => {
                const qId = ul.dataset.id;
                const qIndex = parseInt(ul.dataset.question);
                const selected = selectedAnswers[qId];
                const q = questionsData.flatMap(d => d.questions).find(qq => qq.id == qId);
                
                if (!q) return;
                
                if (selected !== undefined) {
                    total++;
                    const opts = ul.querySelectorAll('li');
                    let isCorrect = false;
                    
                    if (q.type === 'multi') {
                        const correctAnswer = q.answer.split(/[,,]/).map(s => s.trim());
                        const correctIndices = correctAnswer.map(c => c.charCodeAt(0) - 65);
                        const userIndices = selected.sort();
                        isCorrect = JSON.stringify(correctIndices) === JSON.stringify(userIndices);
                    } else {
                        const correctIndex = q.answer.trim().charCodeAt(0) - 65;
                        isCorrect = selected[0] === correctIndex;
                    }
                    
                    if (isCorrect) {
                        correct++;
                        selected.forEach(i => { if (opts[i]) opts[i].classList.add('correct'); });
                    } else {
                        selected.forEach(i => { if (opts[i]) opts[i].classList.add('incorrect'); });
                        // 加入错题本
                        if (!wrongQuestions.includes(qId)) {
                            wrongQuestions.push(qId);
                            localStorage.setItem('wrongQuestions', JSON.stringify(wrongQuestions));
                        }
                    }
                    
                    // 记录答题历史
                    answerHistory.push({
                        qId: qId,
                        correct: isCorrect,
                        time: new Date().toISOString()
                    });
                    localStorage.setItem('answerHistory', JSON.stringify(answerHistory));
                }
            });
            
            const accuracy = total > 0 ? ((correct / total) * 100).toFixed(1) : 0;
            document.getElementById('score-current').textContent = correct;
            document.getElementById('accuracy-current').textContent = accuracy + '%';
            document.getElementById('stat-correct').textContent = parseInt(document.getElementById('stat-correct').textContent) + correct;
            document.getElementById('stat-wrong').textContent = wrongQuestions.length;
            
            updateStats();
        }
        
        // 显示全部答案
        function showAllAnswers() {
            document.querySelectorAll('.answer-section').forEach(a => a.classList.add('show'));
        }
        
        // 重新开始
        function resetPractice() {
            selectedAnswers = {};
            document.querySelectorAll('.answer-section').forEach(a => a.classList.remove('show'));
            document.querySelectorAll('.options li').forEach(li => li.classList.remove('selected', 'correct', 'incorrect'));
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('score-current').textContent = '0';
            document.getElementById('accuracy-current').textContent = '0%';
            document.getElementById('stat-answered').textContent = '0';
            renderQuestions();
        }
        
        // 切换收藏
        function toggleFavorite(qId) {
            const idx = favoriteQuestions.indexOf(qId);
            if (idx >= 0) {
                favoriteQuestions.splice(idx, 1);
            } else {
                favoriteQuestions.push(qId);
            }
            localStorage.setItem('favoriteQuestions', JSON.stringify(favoriteQuestions));
            document.getElementById('stat-favorite').textContent = favoriteQuestions.length;
            renderQuestions();
        }
        
        // 渲染错题
        function renderWrongQuestions() {
            const container = document.getElementById('wrong-questions');
            const allQuestions = questionsData.flatMap(d => d.questions);
            const wrong = allQuestions.filter(q => wrongQuestions.includes(q.id));
            
            if (wrong.length === 0) {
                container.innerHTML = '<div class="empty-state">🎉 暂无错题，继续加油！</div>';
                return;
            }
            
            container.innerHTML = wrong.map((q, i) => `
                <div class="question-card">
                    <div class="question-text">${i + 1}. ${q.text}</div>
                    <div style="color: var(--success); margin: 10px 0;"><strong>✅ 正确答案：</strong> ${q.answer}</div>
                    ${q.explanation ? `<div style="color: #666;"><strong>📝 解析：</strong> ${q.explanation}</div>` : ''}
                    <button class="btn btn-secondary" onclick="removeFromWrong(${q.id})" style="margin-top: 10px;">🗑️ 移除错题</button>
                </div>
            `).join('');
        }
        
        // 移除错题
        function removeFromWrong(qId) {
            const idx = wrongQuestions.indexOf(qId);
            if (idx >= 0) {
                wrongQuestions.splice(idx, 1);
                localStorage.setItem('wrongQuestions', JSON.stringify(wrongQuestions));
                document.getElementById('stat-wrong').textContent = wrongQuestions.length;
                renderWrongQuestions();
            }
        }
        
        // 渲染收藏
        function renderFavoriteQuestions() {
            const container = document.getElementById('favorite-questions');
            const allQuestions = questionsData.flatMap(d => d.questions);
            const favorite = allQuestions.filter(q => favoriteQuestions.includes(q.id));
            
            if (favorite.length === 0) {
                container.innerHTML = '<div class="empty-state">⭐ 暂无收藏，点击星星收藏题目</div>';
                return;
            }
            
            container.innerHTML = favorite.map((q, i) => `
                <div class="question-card">
                    <div class="question-text">${i + 1}. ${q.text}</div>
                    <ul class="options">
                        ${q.options.map((opt, j) => `<li>${opt}</li>`).join('')}
                    </ul>
                    <div style="color: var(--success); margin: 10px 0;"><strong>✅ 正确答案：</strong> ${q.answer}</div>
                    ${q.explanation ? `<div style="color: #666;"><strong>📝 解析：</strong> ${q.explanation}</div>` : ''}
                </div>
            `).join('');
        }
        
        // 渲染分析
        function renderAnalysis() {
            const total = answerHistory.length;
            const correct = answerHistory.filter(a => a.correct).length;
            const wrong = total - correct;
            const accuracy = total > 0 ? ((correct / total) * 100).toFixed(1) : 0;
            
            document.getElementById('analysis-total').textContent = total;
            document.getElementById('analysis-correct').textContent = correct;
            document.getElementById('analysis-wrong').textContent = wrong;
            document.getElementById('analysis-accuracy').textContent = accuracy + '%';
            
            // 题型分析
            const allQuestions = questionsData.flatMap(d => d.questions);
            const typeStats = {};
            answerHistory.forEach(a => {
                const q = allQuestions.find(qq => qq.id == a.qId);
                if (q) {
                    if (!typeStats[q.type]) typeStats[q.type] = {total: 0, correct: 0};
                    typeStats[q.type].total++;
                    if (a.correct) typeStats[q.type].correct++;
                }
            });
            
            document.getElementById('type-analysis').innerHTML = Object.entries(typeStats).map(([type, stats]) => {
                const acc = ((stats.correct / stats.total) * 100).toFixed(1);
                const typeName = {'single':'单选题','multi':'多选题','true_false':'判断题','calculation':'计算分析题'}[type];
                return `
                    <div class="chart-item">
                        <div>${typeName}</div>
                        <div class="chart-bar"><div class="chart-fill" style="width: ${acc}%"></div></div>
                        <div>${stats.correct}/${stats.total} (${acc}%)</div>
                    </div>
                `;
            }).join('');
        }
        
        // 更新统计
        function updateStats() {
            document.getElementById('stat-favorite').textContent = favoriteQuestions.length;
            document.getElementById('stat-wrong').textContent = wrongQuestions.length;
        }
        
        // 导出报告
        function exportReport() {
            const report = {
                time: new Date().toISOString(),
                total: answerHistory.length,
                correct: answerHistory.filter(a => a.correct).length,
                wrong: wrongQuestions.length,
                favorite: favoriteQuestions.length
            };
            
            const blob = new Blob([JSON.stringify(report, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '学习报告.json';
            a.click();
            alert('📊 报告已导出！');
        }
        
        // 初始化
        renderQuestions();
    </script>
</body>
</html>
