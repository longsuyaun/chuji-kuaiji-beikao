<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初级会计备考 - 首页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
        }
        h1 { 
            text-align: center; 
            color: #667eea; 
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #666;
            margin-top: 5px;
            font-size: 13px;
        }
        .btn {
            display: block;
            padding: 15px 30px;
            background: #667eea;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            margin: 10px 0;
            transition: all 0.3s;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .btn-success { background: #4CAF50; }
        .btn-warning { background: #ff9800; }
        .btn-info { background: #2196f3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 初级会计备考</h1>
        <p class="subtitle">在线学习系统</p>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-number">125</div>
                <div class="stat-label">总题数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">4</div>
                <div class="stat-label">题型</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">2</div>
                <div class="stat-label">科目</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">4</div>
                <div class="stat-label">系统</div>
            </div>
        </div>
        
        <a href="advanced-system.html" class="btn">🚀 进阶版自测系统（推荐）</a>
        <a href="final-system.html" class="btn">📖 最终版自测系统</a>
        <a href="exam-system.html" class="btn btn-success">📝 模拟考试系统</a>
        <a href="editor.html" class="btn btn-warning">✏️ 题库编辑器</a>
        
        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #e0e0e0; text-align: center; color: #999; font-size: 13px;">
            <p>🦐 初级会计备考系统 v1.0</p>
            <p>2026-04-08</p>
        </div>
    </div>
    
    <script>
        // 检查文件是否存在
        const files = [
            '进阶版自测系统.html',
            '最终版自测系统.html',
            '模拟考试系统.html',
            '题库编辑器.html'
        ];
        
        files.forEach(file => {
            const link = document.querySelector(`a[href="${file}"]`);
            if (link) {
                link.addEventListener('click', function(e) {
                    // 检查文件
                    fetch(file, {method: 'HEAD'})
                        .catch(err => {
                            alert('文件加载失败，请刷新页面重试');
                            e.preventDefault();
                        });
                });
            }
        });
    </script>
</body>
</html>
