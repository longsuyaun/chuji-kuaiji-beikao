<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初级会计备考 - 模拟考试系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { text-align: center; color: white; margin-bottom: 30px; }
        .exam-info { background: white; padding: 30px; border-radius: 10px; margin-bottom: 30px; text-align: center; }
        .exam-timer { font-size: 48px; font-weight: bold; color: #f44336; margin: 20px 0; }
        .exam-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .stat-item { background: #f5f5f5; padding: 15px; border-radius: 8px; }
        .stat-number { font-size: 24px; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; margin-top: 5px; }
        .question-card { background: white; padding: 30px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .question-text { font-size: 18px; margin-bottom: 25px; line-height: 1.8; }
        .options { list-style: none; }
        .options li { padding: 15px 20px; margin: 10px 0; background: #f9f9f9; border-radius: 8px; cursor: pointer; transition: all 0.3s; border: 2px solid #e0e0e0; font-size: 16px; }
        .options li:hover { background: #f0f7ff; border-color: #667eea; }
        .options li.selected { background: #667eea; color: white; border-color: #667eea; }
        .navigation { display: flex; gap: 10px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .btn { padding: 12px 30px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .btn:hover { background: #5568d3; }
        .btn-secondary { background: #9e9e9e; }
        .btn-success { background: #4CAF50; }
        .question-nav { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin: 20px 0; }
        .nav-item { padding: 10px; background: #e0e0e0; border-radius: 5px; text-align: center; cursor: pointer; font-size: 14px; }
        .nav-item.active { background: #667eea; color: white; }
        .nav-item.answered { background: #4CAF50; color: white; }
        .result-card { background: white; padding: 40px; border-radius: 10px; text-align: center; }
        .result-score { font-size: 72px; font-weight: bold; color: #667eea; margin: 20px 0; }
        .result-detail { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin: 30px 0; }
        .result-item { background: #f5f5f5; padding: 20px; border-radius: 8px; }
        .hidden { display: none; }
        @media (max-width: 768px) { .exam-stats, .result-detail { grid-template-columns: 1fr; } .question-nav { grid-template-columns: repeat(5, 1fr); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 初级会计备考 - 模拟考试系统</h1>
        
        <!-- 开始界面 -->
        <div id="start-screen" class="exam-info">
            <h2 style="margin-bottom: 20px;">模拟考试说明</h2>
            <div style="text-align: left; margin: 20px 0; line-height: 2;">
                <p>📝 <strong>题量：</strong>50 道题（随机抽取）</p>
                <p>⏰ <strong>时间：</strong>90 分钟</p>
                <p>📊 <strong>题型：</strong>单选题、多选题、判断题、计算分析题</p>
                <p>💯 <strong>满分：</strong>100 分</p>
                <p>✅ <strong>及格：</strong>60 分</p>
            </div>
            <button class="btn btn-success" onclick="startExam()" style="font-size: 18px; padding: 15px 50px;">🚀 开始考试</button>
        </div>
        
        <!-- 考试界面 -->
        <div id="exam-screen" class="hidden">
            <div class="exam-info">
                <div class="exam-timer" id="timer">90:00</div>
                <div class="exam-stats">
                    <div class="stat-item"><div class="stat-number" id="stat-total">50</div><div class="stat-label">总题数</div></div>
                    <div class="stat-item"><div class="stat-number" id="stat-answered">0</div><div class="stat-label">已答题</div></div>
                    <div class="stat-item"><div class="stat-number" id="stat-remaining">50</div><div class="stat-label">未答题</div></div>
                </div>
            </div>
            
            <div class="question-nav" id="question-nav"></div>
            
            <div id="question-container"></div>
            
            <div class="navigation">
                <button class="btn btn-secondary" onclick="prevQuestion()">⬅️ 上一题</button>
                <button class="btn" onclick="nextQuestion()">下一题 ➡️</button>
                <button class="btn btn-success" onclick="submitExam()">✅ 交卷</button>
            </div>
        </div>
        
        <!-- 结果界面 -->
        <div id="result-screen" class="hidden">
            <div class="result-card">
                <h2>🎉 考试完成！</h2>
                <div class="result-score" id="result-score">0</div>
                <p style="font-size: 20px; color: #666;">得分 / 100 分</p>
                
                <div class="result-detail">
                    <div class="result-item">
                        <div style="font-size: 36px; font-weight: bold; color: #4CAF50;" id="result-correct">0</div>
                        <div style="color: #666;">正确题数</div>
                    </div>
                    <div class="result-item">
                        <div style="font-size: 36px; font-weight: bold; color: #f44336;" id="result-wrong">0</div>
                        <div style="color: #666;">错误题数</div>
                    </div>
                    <div class="result-item">
                        <div style="font-size: 36px; font-weight: bold; color: #ff9800;" id="result-time">0</div>
                        <div style="color: #666;">用时（分钟）</div>
                    </div>
                    <div class="result-item">
                        <div style="font-size: 36px; font-weight: bold; color: #667eea;" id="result-accuracy">0%</div>
                        <div style="color: #666;">正确率</div>
                    </div>
                </div>
                
                <div class="navigation">
                    <button class="btn" onclick="reviewExam()">📖 查看解析</button>
                    <button class="btn btn-success" onclick="restartExam()">🔄 重新考试</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let questionsData = [];
        let examQuestions = [];
        let currentQuestion = 0;
        let answers = {};
        let timer = null;
        let timeRemaining = 90 * 60;
        let startTime = null;
        
        // 加载题库
        fetch('优化题库_完整版.json')
            .then(r => r.json())
            .then(data => {
                questionsData = data.flatMap(d => d.questions || []);
                console.log('题库加载成功：', questionsData.length, '道题');
            });
        
        // 开始考试
        function startExam() {
            // 随机抽取 50 道题
            const shuffled = [...questionsData].sort(() => Math.random() - 0.5);
            examQuestions = shuffled.slice(0, 50);
            
            currentQuestion = 0;
            answers = {};
            timeRemaining = 90 * 60;
            startTime = new Date();
            
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('exam-screen').classList.remove('hidden');
            
            renderQuestionNav();
            renderQuestion();
            startTimer();
        }
        
        // 渲染题目导航
        function renderQuestionNav() {
            const nav = document.getElementById('question-nav');
            nav.innerHTML = '';
            
            examQuestions.forEach((q, i) => {
                const item = document.createElement('div');
                item.className = 'nav-item' + (i === currentQuestion ? ' active' : '') + (answers[i] ? ' answered' : '');
                item.textContent = i + 1;
                item.onclick = () => goToQuestion(i);
                nav.appendChild(item);
            });
            
            updateStats();
        }
        
        // 渲染题目
        function renderQuestion() {
            const container = document.getElementById('question-container');
            const q = examQuestions[currentQuestion];
            
            const typeName = {'single':'单选题','multi':'多选题','true_false':'判断题','calculation':'计算分析题'}[q.type] || '单选题';
            
            container.innerHTML = `
                <div class="question-card">
                    <div style="margin-bottom: 15px;">
                        <span style="background: #667eea; color: white; padding: 5px 15px; border-radius: 5px; font-size: 14px;">${typeName}</span>
                        <span style="color: #666; margin-left: 10px;">第${currentQuestion + 1}题</span>
                    </div>
                    <div class="question-text">${q.text}</div>
                    <ul class="options">
                        ${q.options.map((opt, i) => `
                            <li data-index="${i}" class="${answers[currentQuestion] && answers[currentQuestion].includes(i) ? 'selected' : ''}" 
                                onclick="selectOption(${i})">${opt}</li>
                        `).join('')}
                    </ul>
                </div>
            `;
            
            renderQuestionNav();
        }
        
        // 选择选项
        function selectOption(index) {
            const q = examQuestions[currentQuestion];
            
            if (q.type === 'multi') {
                // 多选题
                if (!answers[currentQuestion]) answers[currentQuestion] = [];
                const idx = answers[currentQuestion].indexOf(index);
                if (idx >= 0) {
                    answers[currentQuestion].splice(idx, 1);
                } else {
                    answers[currentQuestion].push(index);
                }
            } else {
                // 单选题
                answers[currentQuestion] = [index];
            }
            
            renderQuestion();
        }
        
        // 跳转题目
        function goToQuestion(index) {
            currentQuestion = index;
            renderQuestion();
        }
        
        // 上一题
        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }
        
        // 下一题
        function nextQuestion() {
            if (currentQuestion < examQuestions.length - 1) {
                currentQuestion++;
                renderQuestion();
            }
        }
        
        // 更新统计
        function updateStats() {
            const answered = Object.keys(answers).length;
            document.getElementById('stat-answered').textContent = answered;
            document.getElementById('stat-remaining').textContent = examQuestions.length - answered;
        }
        
        // 启动计时器
        function startTimer() {
            timer = setInterval(() => {
                timeRemaining--;
                const minutes = Math.floor(timeRemaining / 60);
                const seconds = timeRemaining % 60;
                document.getElementById('timer').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeRemaining <= 0) {
                    submitExam();
                }
            }, 1000);
        }
        
        // 提交考试
        function submitExam() {
            if (confirm('确定要交卷吗？')) {
                clearInterval(timer);
                calculateResult();
                document.getElementById('exam-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
            }
        }
        
        // 计算结果
        function calculateResult() {
            let correct = 0;
            
            examQuestions.forEach((q, i) => {
                const userAnswer = answers[i];
                if (!userAnswer) return;
                
                if (q.type === 'multi') {
                    // 多选题判断
                    const correctAnswer = q.answer.split(/[,,]/).map(s => s.trim());
                    const correctIndices = correctAnswer.map(c => c.charCodeAt(0) - 65);
                    const userIndices = userAnswer.sort();
                    
                    if (JSON.stringify(correctIndices) === JSON.stringify(userIndices)) {
                        correct++;
                    }
                } else {
                    // 单选题判断
                    const correctAnswer = q.answer.trim();
                    const correctIndex = correctAnswer.charCodeAt(0) - 65;
                    if (userAnswer[0] === correctIndex) {
                        correct++;
                    }
                }
            });
            
            const score = Math.round((correct / examQuestions.length) * 100);
            const endTime = new Date();
            const timeUsed = Math.round((endTime - startTime) / 60000);
            const accuracy = ((correct / examQuestions.length) * 100).toFixed(1);
            
            document.getElementById('result-score').textContent = score;
            document.getElementById('result-correct').textContent = correct;
            document.getElementById('result-wrong').textContent = examQuestions.length - correct;
            document.getElementById('result-time').textContent = timeUsed;
            document.getElementById('result-accuracy').textContent = accuracy + '%';
        }
        
        // 查看解析
        function reviewExam() {
            alert('查看解析功能开发中...');
        }
        
        // 重新考试
        function restartExam() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
