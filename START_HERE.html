<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初级会计备考系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 20px; 
        }
        .container { 
            max-width: 800px; 
            margin: 50px auto; 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #667eea; margin-bottom: 10px; font-size: 32px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 16px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-item { background: #f5f5f5; padding: 15px; border-radius: 8px; text-align: center; }
        .stat-number { font-size: 28px; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; margin-top: 5px; font-size: 13px; }
        .btn { 
            display: block; 
            padding: 18px 30px; 
            background: #667eea; 
            color: white; 
            text-align: center; 
            text-decoration: none; 
            border-radius: 10px; 
            margin: 12px 0; 
            transition: all 0.3s; 
            font-size: 17px;
            border: none;
            cursor: pointer;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.2); }
        .btn-success { background: #4CAF50; }
        .btn-warning { background: #ff9800; }
        .btn-info { background: #2196f3; }
        .footer { margin-top: 30px; padding-top: 20px; border-top: 1px solid #e0e0e0; text-align: center; color: #999; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 初级会计备考系统</h1>
        <p class="subtitle">在线学习平台 - 125 道精选题库</p>
        
        <div class="stats">
            <div class="stat-item"><div class="stat-number">125</div><div class="stat-label">总题数</div></div>
            <div class="stat-item"><div class="stat-number">4</div><div class="stat-label">题型</div></div>
            <div class="stat-item"><div class="stat-number">2</div><div class="stat-label">科目</div></div>
            <div class="stat-item"><div class="stat-number">4</div><div class="stat-label">系统</div></div>
        </div>
        
        <a href="advanced.html" class="btn">🚀 进阶版自测系统（推荐）</a>
        <a href="final.html" class="btn">📖 最终版自测系统</a>
        <a href="exam.html" class="btn btn-success">📝 模拟考试系统</a>
        <a href="editor.html" class="btn btn-warning">✏️ 题库编辑器</a>
        
        <div class="footer">
            <p>🦐 初级会计备考系统 v1.0 | 2026-04-08</p>
            <p>题库来源：OCR 解析 PDF 复习资料</p>
        </div>
    </div>
</body>
</html>
